[package]
name = "zapfc_contracts"
version = "1.8.0"
edition = "2024_07"

[cairo]
sierra-replace-ids = true

[scripts]
migrate = "sozo build && sozo migrate"
spawn = "sozo execute dojo_starter-actions spawn --wait"
move = "sozo execute dojo_starter-actions move -c 1 --wait"

[dependencies]
dojo = "1.8.0"
starknet = "2.13.1"

[[target.starknet-contract]]
build-external-contracts = ["dojo::world::world_contract::world"]

[tool.scarb]
allow-prebuilt-plugins = ["dojo_cairo_macros"]

[dev-dependencies]
cairo_test = "2.13.1"
dojo_cairo_test = "1.8.0"

[tool.dojo.world]
name  = "zapfc"
seed  = "zapfc"

[profile.dev]

[profile.dev.tool.dojo.world]
name = "zapfc"
seed = "zapfc"

[profile.sepolia]

[profile.sepolia.tool.dojo.world]
name = "zapfc"
seed = "zapfc"

[profile.sepolia.tool.dojo.env]
rpc_url         = "https://free-rpc.nethermind.io/sepolia-juno/"
account_address = "0x127fd5f1fe78a71f8bcd1fec63e3fe2f0486b6ecd5c86a0466c3a21fa5cfcec"
private_key     = "REPLACE_WITH_SEPOLIA_PRIVATE_KEY"
